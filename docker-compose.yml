version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: event-booking-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    networks:
      - event-booking-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: event-booking-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/event-booking?authSource=admin
      JWT_SECRET: your_jwt_secret_key_here
      STRIPE_SECRET_KEY: your_stripe_secret_key
      STRIPE_PUBLIC_KEY: your_stripe_public_key
      NODE_ENV: development
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000
    networks:
      - event-booking-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: event-booking-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - event-booking-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      REACT_APP_API_URL: http://localhost:5000/api

volumes:
  mongodb_data:

networks:
  event-booking-network:
    driver: bridge
